name: Deploy to DiskStation

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to restart (comma-separated, or "all")'
        default: 'all'
        required: false
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /volume1/docker/chatsuite
  DOCKER_BIN: /usr/local/bin/docker-compose

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy if CI passed (or manual trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DISKSTATION_HOST }}
          username: ${{ secrets.DISKSTATION_USER }}
          key: ${{ secrets.DISKSTATION_SSH_KEY }}
          port: ${{ secrets.DISKSTATION_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:$PATH"

            echo "==> Pulling latest code..."
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main

            echo "==> Pulling updated Docker images..."
            docker-compose pull --quiet

            SERVICES="${{ github.event.inputs.services || 'all' }}"

            if [ "$SERVICES" = "all" ]; then
              echo "==> Recreating all services..."
              docker-compose up -d --remove-orphans
            else
              echo "==> Recreating services: $SERVICES"
              docker-compose up -d --no-deps $SERVICES
            fi

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Service status:"
            docker-compose ps --format "table {{.Name}}\t{{.Status}}"

            echo "==> Deploy complete!"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment to DiskStation" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services:** ${{ github.event.inputs.services || 'all' }}" >> $GITHUB_STEP_SUMMARY
