name: CI

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

# Minimal top-level permissions; jobs escalate as needed
permissions:
  contents: read

env:
  NODE_VERSION: '24'
  NX_NO_CLOUD: 'true'

jobs:
  # ──────────────────────────────────────────────
  # Setup: detect affected projects once, reuse everywhere
  # ──────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has-app-changes: ${{ steps.changes.outputs.apps }}
      has-any-changes: ${{ steps.changes.outputs.any }}
      affected-lint: ${{ steps.affected.outputs.lint }}
      affected-test: ${{ steps.affected.outputs.test }}
      affected-build: ${{ steps.affected.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            apps:
              - 'apps/**'
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.base.json'
              - 'nx.json'
            any:
              - '!docs/**'
              - '!*.md'
              - '!LICENSE'

      - name: Setup pnpm
        if: steps.changes.outputs.apps == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.changes.outputs.apps == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.changes.outputs.apps == 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Derive Nx SHAs
        if: steps.changes.outputs.apps == 'true'
        uses: nrwl/nx-set-shas@v4

      - name: Get affected projects
        if: steps.changes.outputs.apps == 'true'
        id: affected
        run: |
          echo "lint=$(node tools/dev-scripts/cmd-print-affected-array.js lint)" >> $GITHUB_OUTPUT
          echo "test=$(node tools/dev-scripts/cmd-print-affected-array.js test)" >> $GITHUB_OUTPUT
          echo "build=$(node tools/dev-scripts/cmd-print-affected-array.js build)" >> $GITHUB_OUTPUT
          echo "Affected lint: $(node tools/dev-scripts/cmd-print-affected-array.js lint)"
          echo "Affected test: $(node tools/dev-scripts/cmd-print-affected-array.js test)"
          echo "Affected build: $(node tools/dev-scripts/cmd-print-affected-array.js build)"

  # ──────────────────────────────────────────────
  # Lint: per-project matrix for granular PR feedback
  # ──────────────────────────────────────────────
  lint:
    name: 'lint: ${{ matrix.project }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    if: >-
      needs.setup.outputs.has-app-changes == 'true' &&
      needs.setup.outputs.affected-lint != '[]' &&
      needs.setup.outputs.affected-lint != '' &&
      needs.setup.outputs.affected-lint != 'null'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.affected-lint) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint ${{ matrix.project }}
        run: pnpm nx run ${{ matrix.project }}:lint

  # ──────────────────────────────────────────────
  # Format: check code style consistency
  # ──────────────────────────────────────────────
  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: setup
    if: needs.setup.outputs.has-any-changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Check formatting
        run: pnpm biome check apps/

  # ──────────────────────────────────────────────
  # Unit Tests: per-project matrix with coverage
  # ──────────────────────────────────────────────
  test:
    name: 'test: ${{ matrix.project }}'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, lint, format]
    if: >-
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.format.result == 'success' || needs.format.result == 'skipped') &&
      needs.setup.outputs.has-app-changes == 'true' &&
      needs.setup.outputs.affected-test != '[]' &&
      needs.setup.outputs.affected-test != '' &&
      needs.setup.outputs.affected-test != 'null'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.affected-test) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Test ${{ matrix.project }}
        run: pnpm nx run ${{ matrix.project }}:test --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/**/coverage-final.json
          flags: unit-${{ matrix.project }}
          name: ${{ matrix.project }}
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Build: verify projects compile
  # ──────────────────────────────────────────────
  build:
    name: 'build: ${{ matrix.project }}'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup, lint, format]
    if: >-
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.format.result == 'success' || needs.format.result == 'skipped') &&
      needs.setup.outputs.has-app-changes == 'true' &&
      needs.setup.outputs.affected-build != '[]' &&
      needs.setup.outputs.affected-build != '' &&
      needs.setup.outputs.affected-build != 'null'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.affected-build) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build ${{ matrix.project }}
        run: pnpm nx run ${{ matrix.project }}:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: dist/apps/${{ matrix.project }}/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Integration Tests: run against real services
  # ──────────────────────────────────────────────
  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, build]
    if: >-
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test_admin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: chatsuite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: test_admin
          MONGO_INITDB_ROOT_PASSWORD: test_password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run integration tests
        run: pnpm nx affected --target=integration --parallel=1
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test_admin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: chatsuite_test
          MONGODB_URI: mongodb://test_admin:test_password@localhost:27017/chatsuite_test?authSource=admin
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          USE_DOCKER_COMPOSE: 'false'

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/**/coverage-final.json
          flags: integration
          name: integration-tests
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Security: filesystem vulnerability scan
  # ──────────────────────────────────────────────
  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ──────────────────────────────────────────────
  # Status gate: single required check for branch protection
  # ──────────────────────────────────────────────
  status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [lint, format, test, build, integration, security]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | \`${{ needs.lint.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | \`${{ needs.format.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | \`${{ needs.test.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | \`${{ needs.build.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | \`${{ needs.integration.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | \`${{ needs.security.result }}\` |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.format.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.integration.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo ""
            echo "::error::One or more CI checks failed"
            exit 1
          fi

          # Fail if critical jobs were cancelled
          if [[ "${{ needs.lint.result }}" == "cancelled" ]] || \
             [[ "${{ needs.format.result }}" == "cancelled" ]] || \
             [[ "${{ needs.test.result }}" == "cancelled" ]] || \
             [[ "${{ needs.build.result }}" == "cancelled" ]]; then
            echo ""
            echo "::error::One or more CI checks were cancelled"
            exit 1
          fi

          echo ""
          echo "All CI checks passed!"
